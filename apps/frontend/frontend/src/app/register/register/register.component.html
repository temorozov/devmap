<div class="login-container">
    <div class="login-box glass-panel">
        <div class="logo-area">
            <span class="material-icons logo-icon">account_tree</span>
            <h1>Join Skill Tree</h1>
        </div>

        <p class="subtitle">Create an account to save your progress.</p>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="input-group">
                <span class="material-icons">email</span>
                <input type="email" formControlName="email" placeholder="Email address" autocomplete="off">
            </div>

            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" formControlName="password" placeholder="Password (min 6 chars)">
            </div>

            <div class="input-group">
                <span class="material-icons">lock_outline</span>
                <input type="password" formControlName="confirmPassword" placeholder="Confirm Password">
            </div>

            <div *ngIf="successMsg" class="success-msg" style="color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 10px; border-radius: 6px; margin-bottom: 1rem; border: 1px solid rgba(34, 197, 94, 0.2); text-align: center;">
                {{ successMsg }}
            </div>

            <div *ngIf="error" class="error-msg">{{ error }}</div>
            <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched"
                class="error-msg">
                Passwords do not match.
            </div>

            <button type="submit" class="btn-primary" [disabled]="loading || registerForm.invalid || successMsg !== ''">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading" class="material-icons spinning">refresh</span>
            </button>

            <div class="signup-link">
                Already have an account? <a routerLink="/login">Sign In</a>
            </div>

            <div class="divider">
                <span>or register with</span>
            </div>

            <button type="button" class="btn-google" (click)="registerWithGoogle()" [disabled]="loading">
                <span>Google</span>
            </button>
        </form>
    </div>
</div>
