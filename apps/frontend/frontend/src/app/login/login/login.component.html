<div class="login-container">
    <div class="login-box glass-panel">
        <div class="logo-area">
            <span class="material-icons logo-icon">account_tree</span>
            <h1>Skill Tree</h1>
        </div>

        <p class="subtitle">Visualize your growth, master your craft.</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="input-group">
                <span class="material-icons">email</span>
                <input type="email" formControlName="email" placeholder="Email address" autocomplete="off">
            </div>

            <div class="input-group">
                <span class="material-icons">lock</span>
                <input type="password" formControlName="password" placeholder="Password">
            </div>

            <div *ngIf="error" class="error-msg">{{ error }}</div>

            <button type="submit" class="btn-primary" [disabled]="loading || loginForm.invalid">
                <span *ngIf="!loading">Sign In</span>
                <span *ngIf="loading" class="material-icons spinning">refresh</span>
            </button>
        </form>

        <div class="signup-link">
            Don't have an account? <a routerLink="/register">Register</a>
        </div>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="loading">
            <span>Google</span>
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <button type="button" class="btn-secondary" (click)="continueAsGuest()" [disabled]="loading">
            <span>Continue as Guest</span>
            <span class="material-icons">arrow_forward</span>
        </button>
    </div>
</div>
