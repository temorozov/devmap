<div class="confirm-email-container">
  <div class="confirm-email-card">
    <h2>Email Confirmation</h2>
    
    <div *ngIf="loading" class="state-message">
      <div class="spinner"></div>
      <p>Confirming your email address. Please wait...</p>
    </div>

    <div *ngIf="success" class="state-message success">
      <div class="icon-success">✓</div>
      <p>Your email has been successfully confirmed!</p>
      <a routerLink="/login" class="btn">Return to Login</a>
    </div>

    <div *ngIf="error" class="state-message error">
      <div class="icon-error">✗</div>
      <p>{{ error }}</p>
      <a routerLink="/login" class="btn-outline">Return to Login</a>
    </div>
  </div>
</div>
