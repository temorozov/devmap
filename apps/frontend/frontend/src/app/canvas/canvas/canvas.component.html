<div class="canvas-layout">
    <!-- Minimal Header -->
    <header class="canvas-header glass-panel">
        <div class="left-section">
            <button class="icon-btn" (click)="router.navigate(['/dashboard'])" title="Back to Dashboard">
                <span class="material-icons">arrow_back</span>
            </button>
            <h2 *ngIf="tree">{{ tree.title }}</h2>
            <div *ngIf="loading" class="loading-indicator">
                <span class="material-icons spinning">refresh</span>
            </div>
        </div>
        <div class="right-section">
            <div *ngIf="isLinking" class="linking-indicator">
                <span class="pulse-dot"></span>
                <span>Select target node</span>
                <button class="btn-secondary small" (click)="cancelLinking()">Cancel</button>
            </div>
            <button class="btn-primary" (click)="addNode()">
                <span class="material-icons">add</span>
                <span>Add Skill</span>
            </button>
        </div>
    </header>

    <!-- SVG Workspace -->
    <main class="workspace">
        <svg #svgCanvas class="skill-svg" [attr.viewBox]="viewBoxString" (mousedown)="onMouseDown($event)"
            (mousemove)="onMouseMove($event)" (mouseup)="onMouseUp()" (mouseleave)="onMouseUp()"
            (wheel)="onWheel($event)" [class.grabbing]="isDraggingCanvas">

            <!-- Grid Background Pattern -->
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.05)" />
                </pattern>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <rect width="100%" height="100%" fill="url(#grid)" />

            <!-- Connections / Links Layer -->
            <g class="connections-layer">
                <ng-container *ngFor="let node of nodes">
                    <path *ngIf="node.parentId && getParentNode(node.parentId) as parent" class="connection-line"
                        [class.completed]="node.progress === 100 && parent.progress === 100"
                        [attr.d]="'M ' + (parent.positionX + 60) + ' ' + (parent.positionY + 80) + ' C ' + (parent.positionX + 60) + ' ' + (parent.positionY + 140) + ', ' + (node.positionX + 60) + ' ' + (node.positionY - 60) + ', ' + (node.positionX + 60) + ' ' + node.positionY" />
                </ng-container>
            </g>

            <!-- Nodes Layer -->
            <g class="nodes-layer">
                <g *ngFor="let node of nodes" class="skill-node" [class.selected]="selectedNode?.id === node.id"
                    [class.completed]="node.progress === 100"
                    [attr.transform]="'translate(' + node.positionX + ',' + node.positionY + ')'"
                    (mousedown)="onNodeMouseDown($event, node)">

                    <!-- Base Card -->
                    <rect class="node-bg" width="120" height="80" rx="12" />

                    <!-- Progress Bar Background & Fill -->
                    <rect class="progress-bg" x="10" y="65" width="100" height="4" rx="2" />
                    <rect class="progress-fill" x="10" y="65" [attr.width]="node.progress" height="4" rx="2" />

                    <!-- Icon -->
                    <text class="material-icons node-icon" x="60" y="35" text-anchor="middle"
                        dominant-baseline="central">
                        {{ node.icon || 'extension' }}
                    </text>

                    <!-- Title -->
                    <text class="node-title" x="60" y="55" text-anchor="middle">
                        {{ node.title | slice:0:15 }}{{ node.title.length > 15 ? '...' : '' }}
                    </text>

                    <!-- Link Handle (Bottom) -->
                    <circle class="link-handle" cx="60" cy="80" r="6"
                        (mousedown)="startLinking(node); $event.stopPropagation()" title="Drag from here to connect" />
                </g>
            </g>
        </svg>
    </main>

    <!-- Properties Panel -->
    <aside class="properties-panel glass-panel" [class.open]="showProperties">
        <div class="panel-header">
            <h3>Node Properties</h3>
            <button class="icon-btn" (click)="showProperties = false">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="panel-body" *ngIf="selectedNode">
            <div class="form-group">
                <label>Title</label>
                <input type="text" [(ngModel)]="editNodeData.title" (change)="saveNodeProperties()">
            </div>

            <div class="form-group">
                <label>Material Icon Name</label>
                <input type="text" [(ngModel)]="editNodeData.icon" (change)="saveNodeProperties()"
                    placeholder="e.g., star, code, verified">
                <a href="https://fonts.google.com/icons" target="_blank" class="help-link">Find icons</a>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea [(ngModel)]="editNodeData.description" (change)="saveNodeProperties()" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Progress: {{ editNodeData.progress }}%</label>
                <input type="range" min="0" max="100" [(ngModel)]="editNodeData.progress"
                    (change)="saveNodeProperties()" class="range-slider">
            </div>

            <div class="actions mt-4">
                <button class="btn-secondary block w-full text-danger border-danger" (click)="deleteNode()">
                    <span class="material-icons">delete</span> Delete Node
                </button>
            </div>
        </div>
    </aside>
</div>
