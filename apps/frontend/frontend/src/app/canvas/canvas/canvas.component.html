<div class="map-layout">
  <header class="map-header">
    <div class="mh-left">
      <button class="icon-btn" (click)="router.navigate(['/dashboard'])" [title]="i18n.t('canvas.back')">
        <span class="material-icons">arrow_back</span>
      </button>
      <div class="mh-title" *ngIf="tree">
        <h2 [title]="tree.title">{{ tree.title }}</h2>
        <span *ngIf="isDemoTree" class="demo-badge">{{ i18n.t('canvas.demoBadge') }}</span>
      </div>
      <div *ngIf="loading" class="mh-loading">
        <span class="material-icons spinning">refresh</span>
      </div>
      <div class="mh-stats" *ngIf="!loading && nodes.length > 0">
        <span class="stat-num">{{ verifiedCount }}</span><span class="stat-lbl">verified</span>
        <span class="stat-sep">·</span>
        <span class="stat-num">{{ nodes.length }}</span><span class="stat-lbl">total</span>
      </div>
    </div>

    <nav class="mh-nav">
      <a class="mh-link" routerLink="/explore"><span class="material-icons">explore</span>Explore</a>
      <a class="mh-link" routerLink="/dashboard"><span class="material-icons">dashboard</span>Dashboard</a>
    </nav>
  </header>

  <main class="map-stage">
    <div class="map-empty" *ngIf="isEmptyTree">
      <span class="material-icons">hub</span>
      <p>{{ i18n.t('canvas.emptyTitle') || 'No skills yet' }}</p>
    </div>

    <app-skill-graph
      *ngIf="!loading && !isEmptyTree"
      [nodes]="graphNodes"
    ></app-skill-graph>
  </main>
</div>
