<div class="canvas-layout">
    <!-- Minimal Header & Tree Progress -->
    <header class="canvas-header glass-panel">
        <div class="left-section">
            <button class="icon-btn" (click)="router.navigate(['/dashboard'])" title="Back to Dashboard">
                <span class="material-icons">arrow_back</span>
            </button>
            <h2 *ngIf="tree">{{ tree.title }}</h2>
            <div *ngIf="loading" class="loading-indicator">
                <span class="material-icons spinning">refresh</span>
            </div>
            <div class="tree-progress" *ngIf="!loading">
                <div class="progress-bar-container" title="Branch Mastery">
                    <div class="progress-fill" [style.width.%]="totalProgress"></div>
                </div>
                <span>{{ totalProgress }}%</span>
            </div>
        </div>
        <div class="right-section">
            <div *ngIf="isLinking" class="linking-indicator">
                <span class="pulse-dot"></span>
                <span>Select child skill above</span>
                <button class="btn-secondary small" (click)="cancelLinking()">Cancel</button>
            </div>
            <button class="btn-primary" (click)="addNode()">
                <span class="material-icons">add</span>
                <span>Add Skill</span>
            </button>
        </div>
    </header>

    <!-- SVG Workspace -->
    <main class="workspace">
        <svg #svgCanvas class="skill-svg" [attr.viewBox]="viewBoxString" (mousedown)="onMouseDown($event)"
            (mousemove)="onMouseMove($event)" (mouseup)="onMouseUp()" (mouseleave)="onMouseUp()"
            (wheel)="onWheel($event)" (contextmenu)="onCanvasContextMenu($event)" [class.grabbing]="isDraggingCanvas">

            <!-- Grid Background Pattern -->
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.05)" />
                </pattern>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <rect width="100%" height="100%" fill="url(#grid)" />

            <!-- Connections / Links Layer -->
            <g class="connections-layer">
                <!-- Existing complete connections -->
                <ng-container *ngFor="let node of nodes">
                    <path *ngIf="node.parentId && getParentNode(node.parentId) as parent" class="connection-line"
                        [class.completed]="node.level === (node.maxLevel || 5) && parent.level === (parent.maxLevel || 5)"
                        [attr.d]="'M ' + parent.positionX + ' ' + (parent.positionY - 40) + ' C ' + parent.positionX + ' ' + (parent.positionY - 100) + ', ' + node.positionX + ' ' + (node.positionY + 100) + ', ' + node.positionX + ' ' + (node.positionY + 40)" />
                </ng-container>

                <!-- Currently drawn line during drag to link -->
                <path *ngIf="isLinking && linkSourceNode" class="connection-line linking"
                    [attr.d]="'M ' + linkSourceNode.positionX + ' ' + (linkSourceNode.positionY - 40) + ' C ' + linkSourceNode.positionX + ' ' + (linkSourceNode.positionY - 100) + ', ' + mousePosition.x + ' ' + (mousePosition.y + 100) + ', ' + mousePosition.x + ' ' + mousePosition.y" />
            </g>

            <!-- Nodes Layer -->
            <g class="nodes-layer">
                <g *ngFor="let node of nodes" class="skill-node" [class.selected]="selectedNode?.id === node.id"
                    [class.completed]="node.level === (node.maxLevel || 5)"
                    [attr.transform]="'translate(' + node.positionX + ',' + node.positionY + ')'"
                    (mousedown)="onNodeMouseDown($event, node)" (click)="onNodeClick($event, node)"
                    (contextmenu)="onNodeContextMenu($event, node)" (mouseenter)="hoveredNode = node"
                    (mouseleave)="hoveredNode = null" (mouseup)="onNodeMouseUp($event, node)">

                    <!-- Base Circle -->
                    <circle class="node-bg" cx="0" cy="0" r="40" />

                    <!-- Circular Progress Ring (circumference = 251.32) -->
                    <circle class="progress-ring-bg" cx="0" cy="0" r="40" />
                    <circle class="progress-ring-fill" cx="0" cy="0" r="40" stroke-dasharray="251.32"
                        [attr.stroke-dashoffset]="251.32 - (251.32 * (node.level || 0) / (node.maxLevel || 5))" />

                    <!-- Icon -->
                    <text class="material-icons node-icon" x="0" y="0" text-anchor="middle" dominant-baseline="central">
                        {{ node.icon || 'star' }}
                    </text>

                    <!-- Link Handle (Top of Node, as it grows upwards) -->
                    <circle class="link-handle" cx="0" cy="-40" r="8"
                        (mousedown)="startLinking($event, node); $event.stopPropagation()"
                        title="Drag from here to connect" />

                    <!-- Native tooltip and text for hover -->
                    <title>{{ node.title }} - Lvl {{ node.level || 0 }} / {{ node.maxLevel || 5 }}</title>
                    <text class="node-title-hover" x="0" y="60" text-anchor="middle" pointer-events="none">
                        {{ node.title }}
                    </text>

                    <!-- SVG ForeignObject Tooltip below node -->
                    <foreignObject x="-90" y="75" width="180" height="auto" class="node-tooltip"
                        *ngIf="hoveredNode?.id === node.id" pointer-events="none">
                        <div xmlns="http://www.w3.org/1999/xhtml" class="tooltip-content glass-panel">
                            <h4>{{ node.title }}</h4>
                            <p class="desc" *ngIf="node.description">{{ node.description }}</p>
                            <div class="level-badge">Lvl {{ node.level || 0 }} / {{ node.maxLevel || 5 }}</div>
                        </div>
                    </foreignObject>
                </g>
            </g>
        </svg>
    </main>

    <!-- Properties Panel -->
    <aside class="properties-panel glass-panel" [class.open]="showProperties">
        <div class="panel-header">
            <h3>Node Properties</h3>
            <button class="icon-btn" (click)="showProperties = false">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="panel-body" *ngIf="selectedNode">
            <div class="form-group">
                <label>Title</label>
                <input type="text" [(ngModel)]="editNodeData.title" (ngModelChange)="saveNodeProperties()">
            </div>

            <div class="form-group">
                <label>Icon</label>
                <div class="icon-grid">
                    <button *ngFor="let icon of availableIcons" class="icon-select-btn"
                        [class.active]="editNodeData.icon === icon.name"
                        (click)="editNodeData.icon = icon.name; saveNodeProperties()" [title]="icon.label">
                        <span class="material-icons">{{ icon.name }}</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea [(ngModel)]="editNodeData.description" (ngModelChange)="saveNodeProperties()"
                    rows="3"></textarea>
            </div>

            <div class="form-group row-group">
                <div class="half-width">
                    <label>Level</label>
                    <input type="number" min="0" [max]="editNodeData.maxLevel || 5" [(ngModel)]="editNodeData.level"
                        (ngModelChange)="saveNodeProperties()">
                </div>
                <div class="half-width">
                    <label>Max Level</label>
                    <input type="number" min="1" [(ngModel)]="editNodeData.maxLevel"
                        (ngModelChange)="saveNodeProperties()">
                </div>
            </div>

            <div class="actions mt-4">
                <button class="btn-secondary block w-full text-danger border-danger" (click)="deleteNode()">
                    <span class="material-icons">delete</span> Delete Node
                </button>
            </div>

            <p class="hint-text mt-4 text-xs text-muted text-center"
                style="color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem;">
                Left-Click to level up. Shift-Click to downgrade. Right-Click for properties.
            </p>
        </div>
    </aside>
</div>
