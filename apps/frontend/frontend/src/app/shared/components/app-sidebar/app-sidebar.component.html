<aside class="sidebar" [class.sidebar-open]="mobileOpen()">

  <!-- Top: brand + mobile toggle -->
  <div class="sb-top">
    <a class="sb-brand" routerLink="/" (click)="closeMobile()">
      <svg class="sb-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        <circle cx="4" cy="6" r="2" fill="currentColor" opacity=".6"/>
        <circle cx="20" cy="6" r="2" fill="currentColor" opacity=".6"/>
        <circle cx="4" cy="18" r="2" fill="currentColor" opacity=".6"/>
        <circle cx="20" cy="18" r="2" fill="currentColor" opacity=".6"/>
        <line x1="12" y1="12" x2="4" y2="6" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
        <line x1="12" y1="12" x2="20" y2="6" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
        <line x1="12" y1="12" x2="4" y2="18" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
        <line x1="12" y1="12" x2="20" y2="18" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
      </svg>
      <span class="sb-brand-name">DevMap</span>
    </a>
    <button class="sb-burger" (click)="toggleMobile()" [attr.aria-expanded]="mobileOpen()" aria-label="Toggle menu">
      <span class="material-icons">{{ mobileOpen() ? 'close' : 'menu' }}</span>
    </button>
  </div>

  <!-- Collapsible body -->
  <div class="sb-scroll">

    <nav class="sb-nav">
      <ng-container *ngIf="!isGuest">
        <a class="sb-link" [class.sb-link-active]="active === 'profile'"
           [routerLink]="['/dashboard']" [queryParams]="{ view: 'profile' }" (click)="closeMobile()">
          <span class="material-icons sb-link-icon">badge</span>
          <span class="sb-link-label">Profile</span>
        </a>
        <a class="sb-link" [class.sb-link-active]="active === 'skillmap'"
           [routerLink]="['/dashboard']" [queryParams]="{ view: 'skillmap' }" (click)="closeMobile()">
          <span class="material-icons sb-link-icon">hub</span>
          <span class="sb-link-label">Skill Map</span>
        </a>
        <a class="sb-link" [class.sb-link-active]="active === 'career'"
           [routerLink]="['/dashboard']" [queryParams]="{ view: 'career' }" (click)="closeMobile()">
          <span class="material-icons sb-link-icon">track_changes</span>
          <span class="sb-link-label">Career</span>
        </a>
      </ng-container>

      <div class="sb-divider" *ngIf="!isGuest"></div>

      <a class="sb-link" [class.sb-link-active]="active === 'explore'"
         routerLink="/explore" (click)="closeMobile()">
        <span class="material-icons sb-link-icon">explore</span>
        <span class="sb-link-label">Explore</span>
      </a>
      <a class="sb-link" [class.sb-link-active]="active === 'compare'"
         routerLink="/compare" (click)="closeMobile()">
        <span class="material-icons sb-link-icon">compare_arrows</span>
        <span class="sb-link-label">Compare</span>
      </a>
    </nav>

    <!-- Footer: user block / guest CTA -->
    <div class="sb-foot">

      <ng-container *ngIf="!isGuest; else guestCta">
        <span class="sb-views" *ngIf="viewStats && viewStats.thisWeek > 0"
              [title]="viewStats.total + ' total profile views'">
          <span class="material-icons" style="font-size:0.85rem;opacity:0.7">visibility</span>
          {{ viewStats.thisWeek }} view{{ viewStats.thisWeek === 1 ? '' : 's' }} this week
        </span>

        <button class="sb-sync" (click)="sync.emit()" [disabled]="syncing">
          <svg *ngIf="!syncing" class="sb-sync-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          <span *ngIf="syncing" class="material-icons spinning" style="font-size:1rem">refresh</span>
          {{ syncing ? 'Syncing…' : 'Re-sync GitHub' }}
        </button>

        <div class="sb-user">
          <img *ngIf="avatarUrl" [src]="avatarUrl" class="sb-avatar" [alt]="handle || ''">
          <div class="sb-avatar-ph" *ngIf="!avatarUrl">
            <span class="material-icons" style="font-size:1rem">person</span>
          </div>
          <span class="sb-handle" *ngIf="handle">&#64;{{ handle }}</span>
          <button class="sb-logout" (click)="logout.emit()" title="Log out">
            <span class="material-icons" style="font-size:1rem">logout</span>
          </button>
        </div>
      </ng-container>

      <ng-template #guestCta>
        <a class="sb-connect" routerLink="/login" (click)="closeMobile()">
          <svg class="sb-sync-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          Connect GitHub
        </a>
      </ng-template>

    </div>

  </div>
</aside>
