<div class="dialog-overlay" *ngIf="!isClosing" @overlayAnimation (click)="isConfirm ? cancel() : close(true)">
  <div class="dialog-container glass-panel" @dialogAnimation (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h3 class="dialog-title">{{ title || i18n.t(isConfirm ? 'dialog.confirm' : 'dialog.alert') }}</h3>
      <button class="dialog-close-btn" (click)="isConfirm ? cancel() : close(true)">
        &times;
      </button>
    </div>
    <div class="dialog-body">
      <p>{{ message }}</p>
    </div>
    <div class="dialog-footer">
      <button *ngIf="isConfirm" class="btn-secondary" (click)="cancel()">{{ i18n.t('dialog.cancel') }}</button>
      <button class="btn-primary" (click)="confirm()">{{ i18n.t(isConfirm ? 'dialog.confirm' : 'dialog.ok') }}</button>
    </div>
  </div>
</div>
