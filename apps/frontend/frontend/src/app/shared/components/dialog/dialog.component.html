<!-- Backdrop closes on click; keyboard users dismiss via Escape (HostListener) or the buttons below. -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<div class="dialog-overlay" *ngIf="!isClosing" @overlayAnimation (click)="isConfirm ? cancel() : close(true)">
  <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
  <div class="dialog-container glass-panel" @dialogAnimation (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h3 class="dialog-title">{{ title || i18n.t(isConfirm ? 'dialog.confirm' : 'dialog.alert') }}</h3>
      <button class="dialog-close-btn" (click)="isConfirm ? cancel() : close(true)">
        &times;
      </button>
    </div>
    <div class="dialog-body">
      <div *ngIf="!isConfirm" class="dialog-alert-content">
        <div class="dialog-alert-icon" aria-hidden="true">
          <span class="material-icons">info</span>
        </div>
        <p>{{ message }}</p>
      </div>
      <p *ngIf="isConfirm">{{ message }}</p>
    </div>
    <div class="dialog-footer">
      <button *ngIf="isConfirm" class="btn-secondary" (click)="cancel()">{{ i18n.t('dialog.cancel') }}</button>
      <button class="btn-primary" (click)="confirm()">{{ i18n.t(isConfirm ? 'dialog.confirm' : 'dialog.ok') }}</button>
    </div>
  </div>
</div>
